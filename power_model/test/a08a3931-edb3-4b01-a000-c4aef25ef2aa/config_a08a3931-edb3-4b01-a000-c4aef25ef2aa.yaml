## DATA PARAMETERS
seq_length: 3        # 168 = 24 * 7,   720 = 24 * 30

## MODEL HYPERPARAMETERS
hidden_size: 16
num_hidden: 3
nqf_hidden_sizes: [16, 8]

## TRAINING PARAMETERS
learning_rate: 0.0001
batch_size: 20
epochs: 32

# Contains quantiles to learn to predict, these values are the same as those used in the NQF-RNN paper
quantile_levels: [0.01, 0.05, 0.1, 0.5, 0.9, 0.99]

# Early stopping
early_stop_epoch: 12
patience: 4

# Train-validation-test split
train_percent: 0.8
val_percent: 0.1
test_percent: 0.1