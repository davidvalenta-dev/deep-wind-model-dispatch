baseload_degree: ['rand(2, 5)']

storage_factor: ['rand(1, 3)']
storage_degree: ['rand(2, 4)']
storage_threshold: ['rand(500, 2000)']

price_factor: ['rand(2, 5)']
price_degree: ['rand(2, 5)']

adaptive_degree: ['rand(0.25, 0.125)']