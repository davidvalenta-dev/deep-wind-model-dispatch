## HYPER-PARAMETER SEARCHING CONVENTIONS:
# When a hyperparameter is an array containing multiple elements, 
# one of the elements is uniformly randomly selected

# When a hyperparameter is an array containing exactly one element that is a string formatted as follows:
# 'rand(x, y)', the hp is uniformly randomly selected between [x, y]

## MODEL HYPERPARAMETERS
hidden_size: [16, 32, 64, 128]
fc_hidden_sizes: [[32, 16], [64, 32], [128, 64]]

## LOSS HYPERPARAMETERS
