## DATA PARAMETERS
seq_length: 168       # 168 = 24 * 7,   720 = 24 * 30
rated_capacity: 249   # in MW
price_threshold: 1000

storage_type: 'caes' # in [battery-li, caes, hydro]

## STORAGE PARAMETERS
# The following two parameters fully describe the system, and from these CAPEX and round-trip efficiency (RTE) are
# calculated based on 2023 data from PNNL at https://www.pnnl.gov/projects/esgc-cost-performance/lithium-ion-battery
storage_rating: 100  # in MW
# battery-li: [1, 10, 100, 1000]
# caes: [100, 1000]
# hydro: [100, 1000]
storage_duration: 4 # in hrs
# battery-li: [2, 4, 6, 8, 10, 24, 100]
# caes: [4, 10, 24, 100]
# hydro: [4, 10, 24, 100]
num_modules: 1

## MODEL HYPERPARAMETERS
hidden_size: 16
num_hidden: 3
fc_hidden_sizes: [128, 64]

## LOSS HYPERPARAMETERS
# This is a small value that prevents the COVE computation from causing a division by 0
# There shouldn't be much reason to change this
epsilon: 0.00001

# As the associated polynomial for the following parameters grows, 
# the associated behavior will be more strongly enforced during training

# Promotes baseload behavior by penalizing model for releasing power 
# less than the current time-windows (seq_length) power average
baseload_factor: 2.70240603090807
baseload_degree: 2.5460566625956487

# Mitigates massive storage by penalizing model as its total energy stored increases
storage_factor: 1.8067351579777913
storage_degree: 3.287969084321487
storage_threshold: 1101.3281191401945

# Enforces behaviors above more or less strongly depending on whether or not price is above or below average
price_factor: 3.3821570281358655
price_degree: 4.602214863665654

# Adaptively scales effect of penalties as epochs trained increase, only applies after adaptive epoch is reached
adaptive_factor: 1
adaptive_degree: 0.1522919535041743
adaptive_epoch: 8

## TRAINING PARAMETERS
learning_rate: 0.0001
batch_size: 8
epochs: 32

# Early stopping
early_stop_epoch: 4
patience: 3

# Train-validation-test split
train_percent: 0.7
val_percent: 0.2
test_percent: 0.1

# Hyper-parameter search
hp_search_cutoff_epoch: 10 # epoch to check against best model
hp_comparison_length: 8760 # length of sequence to compare COVE against after cutoff epoch
hp_runs: 100 # number of models to randomly search over