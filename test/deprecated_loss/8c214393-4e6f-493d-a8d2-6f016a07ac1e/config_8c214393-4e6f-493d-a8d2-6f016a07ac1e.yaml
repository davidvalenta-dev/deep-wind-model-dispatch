## DATA PARAMETERS
seq_length: 168        # 168 = 24 * 7,   720 = 24 * 30
rated_capacity: 249   # in MW
price_threshold: 500

## MODEL HYPERPARAMETERS
hidden_size: 16
num_hidden: 3
fc_hidden_sizes: [16, 8]

## LOSS HYPERPARAMETERS
# This is a small value that prevents the LCOE from causing a division by 0
# There shouldn't be much reason to change this
epsilon: 0.00001

# The following control the gradient of the peaker goal, 
# where the goal is on the order of ((eta * max(price - price_avg)) ** gamma) * power_avg
eta: 1
gamma: 1

# As the associated polynomial for the following parameters grows, 
# the associated behavior will be more strongly enforced during training

# Promotes baseload behavior by penalizing model for releasing power 
# less than the current time-windows (seq_length) power average
baseload_factor: 5
baseload_degree: 4

# Promotes peaker behavior by penalizing model for releasing power 
# under the current time-windows (seq_length) power average * max(0, current price - average price)
# The idea here is that when the price is high, the model is penalized for not releasing more
peaker_factor: 0
peaker_degree: 0

## TRAINING PARAMETERS
learning_rate: 0.001
batch_size: 2
epochs: 32

# Early stopping
early_stop_epoch: 5
patience: 3

# Train-validation-test split
train_percent: 0.8
val_percent: 0.1
test_percent: 0.1