## DATA PARAMETERS
seq_length: 720        # 168 = 24 * 7,   720 = 24 * 30
rated_capacity: 249   # in MW
price_threshold: 500

## MODEL HYPERPARAMETERS
hidden_size: 16
num_hidden: 3
fc_hidden_sizes: [16, 8]

## TRAINING PARAMETERS
learning_rate: 0.001
batch_size: 5
epochs: 20

# Early stopping
early_stop_epoch: 10
patience: 3

# Train-validation-test split
train_percent: 0.8
val_percent: 0.1
test_percent: 0.1